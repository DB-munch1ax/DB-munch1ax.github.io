<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 체육대회 대진표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Root ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #FFFFFF;
  --surface:   #F7F6F3;
  --surface2:  #EFEFEC;
  --border:    #E3E2DE;
  --border2:   #D0CECC;
  --text:      #1A1A18;
  --muted:     #9B9A96;
  --blue:      #2563EB;
  --blue-bg:   #EEF2FF;
  --blue-dim:  #3730A3;
  --green:     #166534;
  --green-bg:  #F0FDF4;
  --green-bd:  #86EFAC;
  --amber:     #92400E;
  --amber-bg:  #FFFBEB;
  --amber-bd:  #FCD34D;
  --gold:      #D97706;
  --bye-bg:    #F0FDF4;
  --bye-bd:    #86EFAC;
  --bye-text:  #15803D;
  --tbd-text:  #C4C3BC;
  --shadow:    0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
}

body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
}

/* ── Page wrapper ── */
.page { max-width: 1440px; margin: 0 auto; padding: 52px 56px 80px; }

/* ── Page Header ── */
.page-emoji { font-size: 48px; line-height: 1; display: block; margin-bottom: 12px; }
.page-title {
  font-size: 36px; font-weight: 700; letter-spacing: -0.7px;
  margin-bottom: 4px; color: var(--text);
}
.page-meta { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

/* ── Properties ── */
.props {
  border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden; margin-bottom: 36px;
}
.prop-row {
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border); font-size: 12.5px;
}
.prop-row:last-child { border-bottom: none; }
.prop-key {
  width: 110px; flex-shrink: 0; padding: 9px 14px;
  color: var(--muted); font-size: 11.5px; font-weight: 500;
  border-right: 1px solid var(--border); letter-spacing: .02em;
}
.prop-val { padding: 8px 14px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11.5px; font-weight: 500; border-radius: 20px;
  padding: 2px 10px; white-space: nowrap;
}
.chip-b { background: var(--blue-bg);  color: var(--blue-dim); }
.chip-g { background: var(--green-bg); color: var(--green); }
.chip-a { background: var(--amber-bg); color: var(--amber); border: 1px solid #FDE68A; }

/* ── Divider ── */
.divider { height: 1px; background: var(--border); margin: 28px 0; }

/* ── Tabs ── */
.tabs {
  display: flex; border-bottom: 1.5px solid var(--border);
  margin-bottom: 32px; overflow-x: auto; gap: 0;
}
.tab {
  padding: 8px 20px; border: none; background: none;
  font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -1.5px;
  transition: color .15s, border-color .15s;
  display: flex; align-items: center; gap: 6px;
}
.tab:hover { color: var(--text); }
.tab.on { color: var(--text); border-bottom-color: var(--text); }

/* ── Sport view ── */
.sport-view { display: none; }
.sport-view.on { display: block; }

/* ── Info strip ── */
.info-strip {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 24px; font-size: 12px;
}
.info-count { color: var(--muted); }
.info-bye {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--bye-bg); border: 1px dashed var(--bye-bd);
  border-radius: 4px; padding: 2px 10px; color: var(--bye-text);
}
.info-rule {
  background: var(--amber-bg); border: 1px solid #FDE68A;
  border-radius: 4px; padding: 2px 10px; color: var(--amber);
}

/* ════════════════════════════════
   BRACKET — top-to-bottom (가로)
════════════════════════════════ */
.bracket-wrap { overflow-x: auto; }
.bracket { display: flex; flex-direction: column; gap: 0; min-width: 720px; }

/* Round row */
.round-row { display: flex; flex-direction: column; margin-bottom: 0; }
.round-label {
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
  padding: 0 0 8px 2px; text-align: center;
}

/* Matches row inside a round */
.matches-row {
  display: flex; align-items: stretch; justify-content: space-around;
  padding: 0;
}

/* Individual match card */
.match-card {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 0 4px;
  min-width: 0;
}
.match-inner {
  width: 100%; max-width: 140px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden;
  box-shadow: var(--shadow);
}
.team-slot {
  display: block; padding: 6px 10px;
  font-size: 12px; color: var(--text);
  border-bottom: 1px solid var(--border);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  background: var(--bg); transition: background .1s;
}
.team-slot:last-child { border-bottom: none; }
.team-slot:hover { background: var(--surface2); }
.team-slot.tbd {
  color: var(--tbd-text); background: var(--surface); font-style: italic; font-size: 11px;
}
.team-slot.bye {
  color: var(--bye-text); background: var(--bye-bg);
  border-bottom-color: var(--bye-bd);
}

/* Spacer row between rounds (for connector lines) */
.spacer-row {
  height: 24px; display: flex; justify-content: space-around; align-items: center;
}
.spacer-cell {
  flex: 1; display: flex; justify-content: center; align-items: center;
}

/* Round label between rounds */
.round-sep {
  font-size: 10px; font-weight: 600; letter-spacing: .09em;
  color: var(--muted); text-transform: uppercase;
  text-align: center; padding: 16px 0 8px; margin-top: 4px;
}

/* ── Group stage block ── */
.group-stage {
  margin: 8px 0 4px;
}
.group-row {
  display: flex; justify-content: space-around; gap: 12px;
  flex-wrap: wrap;
}
.group-card {
  flex: 1; min-width: 160px; max-width: 240px;
  border: 1px solid var(--border); border-radius: 7px;
  overflow: hidden; box-shadow: var(--shadow);
}
.group-head {
  background: var(--surface2); padding: 6px 12px;
  font-size: 10.5px; font-weight: 700; letter-spacing: .07em;
  color: var(--muted); text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.group-rule-tag {
  font-size: 10px; background: var(--amber-bg); color: var(--amber);
  border: 1px solid #FDE68A; border-radius: 3px; padding: 1px 6px;
  text-transform: none; letter-spacing: 0; font-weight: 500;
}
.group-teams { padding: 4px 0; }
.group-team {
  padding: 5px 12px; font-size: 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 7px;
}
.group-team:last-child { border-bottom: none; }
.team-idx {
  width: 16px; height: 16px; border-radius: 50%; background: var(--surface2);
  font-size: 9.5px; font-weight: 700; color: var(--muted);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.group-team.tbd .team-idx { background: var(--surface); }
.group-team.tbd span:last-child { color: var(--tbd-text); font-style: italic; font-size: 11px; }

/* ── Final match ── */
.final-row {
  display: flex; flex-direction: column; align-items: center; margin-top: 4px;
}
.final-label {
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.final-card {
  width: 200px; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; overflow: hidden; box-shadow: var(--shadow);
}
.final-card .team-slot {
  padding: 8px 14px; font-size: 13px;
}

/* ── Champion ── */
.champion-row {
  display: flex; justify-content: center; margin-top: 12px;
}
.champion-card {
  background: linear-gradient(145deg, #FFFCE8, #FEF3C7);
  border: 1.5px solid var(--amber-bd); border-radius: 10px;
  padding: 18px 32px; text-align: center; min-width: 160px;
  box-shadow: 0 2px 8px rgba(251,191,36,.15);
}
.champ-icon { font-size: 28px; }
.champ-label { font-size: 10px; color: var(--muted); letter-spacing: .08em; margin-top: 8px; text-transform: uppercase; }
.champ-name  { font-size: 14px; font-weight: 700; margin-top: 4px; color: var(--text); min-height: 21px; }

/* ── 3·4위전 ── */
.third-place {
  display: flex; flex-direction: column; align-items: center; margin-top: 28px;
}
.third-label {
  font-size: 10px; font-weight: 700; letter-spacing: .09em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.third-card {
  width: 200px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; overflow: hidden; box-shadow: var(--shadow);
  position: relative;
}
.third-badge {
  text-align: center; padding: 4px 0;
  font-size: 10px; font-weight: 600; color: var(--muted);
  background: var(--surface2); border-bottom: 1px solid var(--border);
  letter-spacing: .04em;
}
</style>
</head>
<body>
<div class="page">

  <!-- ── Page Header ── -->
  <span class="page-emoji">🏆</span>
  <h1 class="page-title">2026 체육대회 대진표</h1>
  <p class="page-meta">한서대학교 · 34대 학생회 주최 · 승리팀 음영 표시</p>

  <div id="s3" class="sport-view"></div>
  <div id="s4" class="sport-view"></div>
  <div id="s5" class="sport-view"></div>
  <div id="s6" class="sport-view"></div>

</div>

<script>
/* ══════════════════════════════
   TEAM SLOT HELPERS
══════════════════════════════ */
function slot(name) {
  if (!name) return `<div class="team-slot tbd">진출팀</div>`;
  return `<div class="team-slot">${name}</div>`;
}
function slotBye(name) {
  return `<div class="team-slot bye">🎗 ${name}</div>`;
}

/* ══════════════════════════════
   MATCH CARD
══════════════════════════════ */
function matchCard(t1, t2, { t1bye=false, t2bye=false }={}) {
  const a = t1bye ? slotBye(t1) : slot(t1);
  const b = t2bye ? slotBye(t2) : slot(t2);
  return `<div class="match-card"><div class="match-inner">${a}${b}</div></div>`;
}

/* ══════════════════════════════
   ROUND ROW
══════════════════════════════ */
function roundRow(label, matchesHtml) {
  return `
    <div class="round-row">
      <div class="round-label">${label}</div>
      <div class="matches-row">${matchesHtml}</div>
    </div>`;
}

/* ══════════════════════════════
   EMPTY NEXT-ROUND SLOTS
══════════════════════════════ */
function emptyRound(label, n) {
  let m = '';
  for (let i=0;i<n;i++) m += matchCard('','');
  return roundRow(label, m);
}

/* ══════════════════════════════
   GROUP STAGE (6강전)
══════════════════════════════ */
function groupStage(groups, ruleText) {
  const cards = groups.map(g => {
    const teams = g.teams.map((t,i) =>
      t ? `<div class="group-team"><div class="team-idx">${i+1}</div><span>${t}</span></div>`
        : `<div class="group-team tbd"><div class="team-idx">·</div><span>진출팀</span></div>`
    ).join('');
    return `<div class="group-card">
      <div class="group-head">
        <span>${g.name}</span>
        <span class="group-rule-tag">${ruleText}</span>
      </div>
      <div class="group-teams">${teams}</div>
    </div>`;
  }).join('');
  return `
    <div class="group-stage">
      <div class="round-label">6강전</div>
      <div class="group-row">${cards}</div>
    </div>`;
}

/* ══════════════════════════════
   FINAL + CHAMPION
══════════════════════════════ */
function finalSection() {
  return `
    <div class="final-row">
      <div class="final-label">결승전</div>
      <div class="final-card">${slot('')}${slot('')}</div>
    </div>
    <div class="champion-row">
      <div class="champion-card">
        <div class="champ-icon">🏆</div>
        <div class="champ-label">우승</div>
        <div class="champ-name">—</div>
      </div>
    </div>`;
}

/* ══════════════════════════════
   3·4위전
══════════════════════════════ */
function thirdPlace() {
  return `
    <div class="third-place">
      <div class="third-label">3 · 4위전</div>
      <div class="third-card">
        <div class="third-badge">동메달 결정전</div>
        ${slot('')}${slot('')}
      </div>
    </div>`;
}

/* ══════════════════════════════
   SPORT DATA
══════════════════════════════ */
const SPORTS = {
  s1: {
    name: '축구', teams: 24,
    byes: [],
    rounds: [
      { label: '24강전', matches: [
        ['항관','재활'],['물치','무항'],['산디','항소'],['전자','교물'],
        ['항기','호카'],['항산','항전'],['자전','작치'],['경호','헬기'],
        ['정비','보안'],['운항','공행'],['해경','레저'],['방사선','신소재'],
      ]},
      { label: '12강전', n: 6 },
    ],
    groupStage: {
      rule: '득실차 부전승',
      groups: [
        { name: 'A조', teams: ['','',''] },
        { name: 'B조', teams: ['','',''] },
      ]
    },
    hasFinal: true, hasThird: false,
  },
  s2: {
    name: '농구', teams: 25,
    byes: [],
    note: '마지막 조: 전기전자·항전·호카 (3팀 리그)',
    rounds: [
      { label: '22강전', matches: [
        ['해경','항소'],['항관','항보'],['교물','간호'],['항정','항기'],
        ['자전','신소재'],['물치','문화재'],['공행','항산'],['헬기','경호'],
        ['방사선','항운'],['재활','산디'],['무항','작치'],['전기전자','항전'],
      ]},
      { label: '12강전', n: 6 },
    ],
    groupStage: {
      rule: '득실차 부전승',
      groups: [
        { name: 'A조', teams: ['','',''] },
        { name: 'B조', teams: ['','',''] },
      ]
    },
    hasFinal: true, hasThird: false,
  },
  s3: {
    name: '족구', teams: 18,
    byes: ['사회복지','항산'],
    rounds: [
      { label: '16강전', matches: [
        ['작치','헬기'],['방사선','항보'],['항관','물치'],['해경','항교물'],
        ['자전','항전'],['항정','경비'],['무항','신소재'],['항기','의료재활'],
      ], byeTeams: ['사회복지','항산'] },

  },

      { label: '16강전', matches: [
        ['항전','무항'],['방사선','항산'],['간호','신소재'],['항보','자전'],
        ['경호','항소'],['헬기','항정'],['작치','교물'],
      ], byeTeams: ['물치'] },
      { label: '8강전', n: 4 },

      { label: '16강전', matches: [

        ['무항','항외'],['자전','항관'],['항교물','방사선'],['항보','물치'],

      { label: '16강전', matches: [
        ['산디','레저'],['무항','방사선'],['물치','항교물'],['항보','치위생'],
        ['작치','헬기'],['경비','항운'],['간호','항소'],['미정','미정'],
      ]},
      { label: '8강전', n: 4 },
      { label: '준결승', n: 2 },
    ],
    hasFinal: true, hasThird: true,
  },
};

/* ══════════════════════════════
   RENDER EACH SPORT
══════════════════════════════ */
function render(sp) {
  let html = '';

  // Info strip
  html += `<div class="info-strip">
    <span class="info-count">총 ${sp.teams}팀 참가</span>`;
  if (sp.byes && sp.byes.length) {
    html += `<span class="info-bye">🎗 부전승: ${sp.byes.join(', ')}</span>`;
  }
  if (sp.note) {
    html += `<span class="info-rule">ⓘ ${sp.note}</span>`;
  }
  html += `</div>`;

  html += `<div class="bracket-wrap"><div class="bracket">`;

  // All rounds
  sp.rounds.forEach((r, ri) => {
    if (r.matches) {
      /* First round — actual teams */
      let cards = '';
      r.matches.forEach(m => cards += matchCard(m[0], m[1]));
      if (r.byeTeams) {
        r.byeTeams.forEach(t => {
          cards += `<div class="match-card">
            <div class="match-inner">${slotBye(t)}</div>
          </div>`;
        });
      }
      html += roundRow(r.label, cards);
    } else {
      /* Later rounds — empty slots */
      html += emptyRound(r.label, r.n);
    }
  });

  // Group stage
  if (sp.groupStage) {
    html += groupStage(sp.groupStage.groups, sp.groupStage.rule);
  }

  // Final + champion
  if (sp.hasFinal) html += finalSection();

  html += `</div></div>`;

  // 3·4위전
  if (sp.hasThird) html += thirdPlace();

  return html;
}

Object.keys(SPORTS).forEach(id => {
  const el = document.getElementById(id);
  if (el) el.innerHTML = render(SPORTS[id]);
});

/* ── Tab switching ── */
function showTab(id, btn) {
  document.querySelectorAll('.sport-view').forEach(e => e.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
}
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 체육대회 대진표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #F7F6F3;
  --border: #E8E7E3;
  --text: #1A1A18;
  --muted: #9A9992;
  --accent: #2563EB;
  --line: #D4D2CC;
  --slot-h: 56px;
  --match-w: 116px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  font-size: 14px;
}
.page {
  max-width: 1360px;
  margin: 0 auto;
  padding: 52px 64px 80px;
}

/* ── Header ── */
.page-emoji { font-size: 52px; margin-bottom: 14px; display: block; }
.page-title {
  font-size: 38px; font-weight: 700;
  letter-spacing: -0.8px; margin-bottom: 6px;
}
.page-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

/* ── Properties ── */
.props {
  display: flex; flex-wrap: wrap; gap: 0;
  border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 40px; overflow: hidden;
}
.prop-row {
  display: flex; align-items: center;
  width: 100%; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.prop-row:last-child { border-bottom: none; }
.prop-key {
  width: 120px; padding: 9px 14px;
  color: var(--muted); font-size: 12px; font-weight: 500;
  border-right: 1px solid var(--border); flex-shrink: 0;
}
.prop-val { padding: 9px 14px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.badge {
  font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: 500;
}
.badge-blue  { background: #EEF2FF; color: #3730A3; }
.badge-green { background: #F0FDF4; color: #166534; }
.badge-amber { background: #FFFBEB; color: #92400E; }
.note-inline { font-size: 12px; color: var(--muted); margin-left: 4px; }

/* ── Divider ── */
hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

/* ── Tabs ── */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 36px; overflow-x: auto;
}
.tab {
  padding: 9px 18px; border: none; background: none;
  font-family: inherit; font-size: 13.5px; font-weight: 500;
  color: var(--muted); cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.tab:hover { color: var(--text); }
.tab.on { color: var(--text); border-bottom-color: var(--text); }

/* ── Sport view ── */
.sport-view { display: none; }
.sport-view.on { display: block; }

.view-legend {
  display: flex; gap: 16px; align-items: center;
  font-size: 12px; color: var(--muted); margin-bottom: 20px; flex-wrap: wrap;
}
.bye-note {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; background: #F0FDF4;
  border: 1px dashed #86EFAC; border-radius: 4px;
  padding: 3px 10px; color: #166534;
}

/* ── Bracket ── */
.bracket-scroll { overflow-x: auto; padding-bottom: 16px; }
.bracket {
  display: inline-flex; align-items: stretch; gap: 0;
}

/* Round column */
.rcol { display: flex; flex-direction: column; flex-shrink: 0; }
.rcol-head {
  font-size: 10.5px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .08em; color: var(--muted);
  text-align: center; padding: 0 8px 14px; white-space: nowrap;
}
.rcol-body { display: flex; flex-direction: column; }

/* Match slot */
.mslot {
  display: flex; align-items: center;
  padding: 4px 8px;
}
.mbox { width: var(--match-w); }

/* Team slot */
.t {
  display: block; padding: 5px 10px;
  border: 1px solid var(--border); background: var(--surface);
  border-radius: 3px; font-size: 12.5px; color: var(--text);
  margin: 2px 0; min-height: 28px; line-height: 1.5;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: background .12s;
}
.t:hover { background: #EEEDEA; }
.t.tbd   { background: #FAFAF8; color: #C0BFB9; font-style: italic; font-size: 12px; }
.t.bye   { background: #F0FDF4; border: 1px dashed #86EFAC; color: #166534; }

/* Connector column */
.ccol {
  width: 26px; flex-shrink: 0;
  display: flex; flex-direction: column;
}
.cpair {
  position: relative;
  border-right: 1.5px solid var(--line);
}
.cpair::before,
.cpair::after {
  content: ''; position: absolute;
  left: 0; right: 0; height: 1.5px;
  background: var(--line);
}
.cpair::before { top: 25%; }
.cpair::after  { top: 75%; }
.csingle {
  position: relative;
}
.csingle::after {
  content: ''; position: absolute;
  left: 50%; right: 0; top: 50%; height: 1.5px;
  background: var(--line);
}

/* Group stage (6강전) */
.gs-col { display: flex; flex-direction: column; flex-shrink: 0; }
.gs-slot {
  display: flex; align-items: flex-start;
  padding: 8px 8px 8px 10px;
}
.gs-box { width: 130px; }
.gs-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--muted); margin-bottom: 6px;
}
.gs-rule {
  font-size: 10.5px; background: #FFFBEB; color: #92400E;
  border: 1px solid #FDE68A; border-radius: 3px;
  padding: 2px 7px; margin-bottom: 7px; display: inline-block;
}

/* Champion */
.champ-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 0 12px; flex-shrink: 0; width: 130px;
}
.champ-card {
  background: linear-gradient(160deg, #FFFCE8 0%, #FEF3C7 100%);
  border: 1.5px solid #FCD34D; border-radius: 8px;
  padding: 18px 14px; text-align: center; width: 108px;
}
.champ-icon { font-size: 26px; }
.champ-lbl  { font-size: 10px; color: var(--muted); letter-spacing: .07em; margin-top: 8px; }
.champ-val  { font-size: 13px; font-weight: 700; margin-top: 4px; min-height: 20px; }

/* 3·4위전 section */
.extra-round {
  margin-top: 28px;
  display: flex; align-items: flex-start; gap: 32px; flex-wrap: wrap;
}
.mini-section { }
.mini-head {
  font-size: 10.5px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .08em; color: var(--muted); margin-bottom: 10px;
}
.mini-match { display: flex; align-items: center; gap: 8px; }
.mini-vs { font-size: 11px; color: var(--muted); margin: 0 4px; }
.mini-result {
  font-size: 12px; color: var(--muted); margin-left: 8px;
  background: #F7F6F3; border: 1px solid var(--border);
  border-radius: 3px; padding: 3px 10px;
}
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <span class="page-emoji">🏆</span>
  <h1 class="page-title">2026 체육대회 대진표</h1>
  <p class="page-sub">한서대학교 · 34대 학생회 주최</p>

  <!-- Properties -->
  <div class="props">
    <div class="prop-row">
      <div class="prop-key">종목</div>
      <div class="prop-val">
        <span class="badge badge-blue">⚽ 축구</span>
        <span class="badge badge-blue">🏀 농구</span>
        <span class="badge badge-blue">🤾 족구</span>
        <span class="badge badge-blue">🎯 피구(남)</span>
        <span class="badge badge-blue">🎯 피구(여)</span>
        <span class="badge badge-blue">⚾ 발야구</span>
      </div>
    </div>
    <div class="prop-row">
      <div class="prop-key">규칙</div>
      <div class="prop-val">
        <span class="badge badge-amber">승리팀 음영 표시</span>
        <span class="badge badge-green">득실차 부전승 (축구·농구 6강전)</span>
      </div>
    </div>
    <div class="prop-row">
      <div class="prop-key">상태</div>
      <div class="prop-val"><span class="badge badge-green">대진 확정</span></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on"  onclick="show('s1',this)">⚽ 축구</button>
    <button class="tab"     onclick="show('s2',this)">🏀 농구</button>
    <button class="tab"     onclick="show('s3',this)">🤾 족구</button>
    <button class="tab"     onclick="show('s4',this)">🎯 피구 (남)</button>
    <button class="tab"     onclick="show('s5',this)">🎯 피구 (여)</button>
    <button class="tab"     onclick="show('s6',this)">⚾ 발야구</button>
  </div>

  <div id="s1" class="sport-view on"></div>
  <div id="s2" class="sport-view"></div>
  <div id="s3" class="sport-view"></div>
  <div id="s4" class="sport-view"></div>
  <div id="s5" class="sport-view"></div>
  <div id="s6" class="sport-view"></div>

</div>

<script>
/* ──────────────────────────────
   DATA
────────────────────────────── */
const SH = 56; // slot height px

const SPORTS = [
  {
    id:'s1', name:'축구', emoji:'⚽', teams:24,
    kind:'grouped',
    r1: { name:'24강전', matches:[
      ['항관','재활'],['물치','무항'],['산디','항소'],['전자','교물'],
      ['항기','호카'],['항산','항전'],['자전','작치'],['경호','헬기'],
      ['정비','보안'],['운항','공행'],['해경','레저'],['방사선','신소재'],
    ]},
    r2: { name:'12강전', n:6 },
    gs: { name:'6강전', rule:'득실차 부전승', groups:[
      {name:'A조', teams:['','','']},
      {name:'B조', teams:['','','']},
    ]},
    fin: '결승전',
  },
  {
    id:'s2', name:'농구', emoji:'🏀', teams:25,
    kind:'grouped',
    r1: { name:'22강전', matches:[
      ['해경','항소'],['항관','항보'],['교물','간호'],['항정','항기'],
      ['자전','신소재'],['물치','문화재'],['공행','항산'],['헬기','경호'],
      ['방사선','항운'],['재활','산디'],['무항','작치'],['전기전자','항전'],
    ], note:'마지막 조: 전기전자 · 항전 · 호카 (3팀 리그)'},
    r2: { name:'12강전', n:6 },
    gs: { name:'6강전', rule:'득실차 부전승', groups:[
      {name:'A조', teams:['','','']},
      {name:'B조', teams:['','','']},
    ]},
    fin: '결승전',
  },
  {
    id:'s3', name:'족구', emoji:'🤾', teams:18,
    kind:'ko4',
    byes:['사회복지','항산'],
    r1: { name:'16강전', matches:[
      ['작치','헬기'],['방사선','항보'],['항관','물치'],['해경','항교물'],
      ['자전','항전'],['항정','경비'],['무항','신소재'],['항기','의료재활'],
    ]},
    r2:{ name:'8강전', n:4 },
    r3:{ name:'준결승', n:2 },
    tp: '3·4위전',
    fin:'결승전',
  },
  {
    id:'s4', name:'피구(남)', emoji:'🎯', teams:15,
    kind:'ko4',
    byes:['물치'],
    r1:{ name:'16강전', matches:[
      ['항전','무항'],['방사선','항산'],['간호','신소재'],['항보','자전'],
      ['경호','항소'],['헬기','항정'],['작치','교물'],
    ]},
    r2:{ name:'8강전', n:4 },
    r3:{ name:'준결승', n:2 },
    tp:'3·4위전',
    fin:'결승전',
  },
  {
    id:'s5', name:'피구(여)', emoji:'🎯', teams:18,
    kind:'ko4',
    byes:['호카','경비'],
    r1:{ name:'16강전', matches:[
      ['공행','작치'],['항산','치위생'],['산디','간호'],['헬기','항운'],
      ['무항','항외'],['자전','항관'],['항교물','방사선'],['항보','물치'],
    ]},
    r2:{ name:'8강전', n:4 },
    r3:{ name:'준결승', n:2 },
    tp:'3·4위전',
    fin:'결승전',
  },
  {
    id:'s6', name:'발야구', emoji:'⚾', teams:16,
    kind:'ko4',
    byes:[],
    r1:{ name:'16강전', matches:[
      ['산디','미정'],['레저','무항'],['방사선','물치'],['항교물','항보'],
      ['치위생','작치'],['헬기','경비'],['항운','간호'],['항소','미정'],
    ]},
    r2:{ name:'8강전', n:4 },
    r3:{ name:'준결승', n:2 },
    tp:'3·4위전',
    fin:'결승전',
  },
];

/* ──────────────────────────────
   HELPERS
────────────────────────────── */
function T(name) {
  if (!name || name === '') return `<div class="t tbd">진출팀</div>`;
  if (name === '미정')      return `<div class="t tbd">미정</div>`;
  return `<div class="t">${name}</div>`;
}
function Tbye(name) { return `<div class="t bye">🎗 ${name} (부전승)</div>`; }

function roundCol(headName, slots) {
  return `<div class="rcol">
    <div class="rcol-head">${headName}</div>
    <div class="rcol-body">${slots}</div>
  </div>`;
}

function connCol(pairs, pairH) {
  let s = '';
  for (let i=0;i<pairs;i++) s += `<div class="cpair" style="height:${pairH}px"></div>`;
  return `<div class="ccol">${s}</div>`;
}
function connColSingle(totalH) {
  return `<div class="ccol"><div class="csingle" style="height:${totalH}px"></div></div>`;
}

/* ──────────────────────────────
   RENDER: GROUPED (축구, 농구)
────────────────────────────── */
function renderGrouped(sp) {
  const N1 = sp.r1.matches.length; // 12
  const N2 = sp.r2.n;              // 6
  const totalH = N1 * SH;

  // Legend
  let html = `<div class="view-legend">
    <span>총 ${sp.teams}팀 참가</span>`;
  if (sp.r1.note) html += `<span style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:4px;padding:3px 10px;font-size:12px;color:#1D4ED8">ⓘ ${sp.r1.note}</span>`;
  html += `</div>`;

  html += `<div class="bracket-scroll"><div class="bracket">`;

  /* Round 1 */
  let r1slots = '';
  for (const m of sp.r1.matches) {
    r1slots += `<div class="mslot" style="height:${SH}px"><div class="mbox">${T(m[0])}${T(m[1])}</div></div>`;
  }
  html += roundCol(sp.r1.name, r1slots);

  /* Connector 1→2 */
  html += connCol(N2, 2*SH);

  /* Round 2 */
  let r2slots = '';
  for (let i=0;i<N2;i++) {
    r2slots += `<div class="mslot" style="height:${2*SH}px"><div class="mbox">${T('')}${T('')}</div></div>`;
  }
  html += roundCol(sp.r2.name, r2slots);

  /* Connector 2→GS (3 slots → 1 group) */
  html += connCol(sp.gs.groups.length, 3*SH);

  /* Group Stage */
  let gsSlots = '';
  for (const g of sp.gs.groups) {
    gsSlots += `<div class="gs-slot" style="height:${3*SH}px;align-items:flex-start;padding-top:12px">
      <div class="gs-box">
        <div class="gs-label">${g.name}</div>
        <div class="gs-rule">${sp.gs.rule}</div>
        ${g.teams.map(t=>T(t)).join('')}
      </div>
    </div>`;
  }
  html += `<div class="gs-col">
    <div class="rcol-head">${sp.gs.name}</div>
    <div class="rcol-body">${gsSlots}</div>
  </div>`;

  /* Connector GS→Final */
  html += connCol(1, totalH);

  /* Final */
  html += roundCol(sp.fin,
    `<div class="mslot" style="height:${totalH}px"><div class="mbox">${T('')}${T('')}</div></div>`
  );

  /* Connector Final→Champion */
  html += connColSingle(totalH);

  /* Champion */
  html += `<div class="champ-wrap" style="height:${totalH+14}px">
    <div class="champ-card">
      <div class="champ-icon">🏆</div>
      <div class="champ-lbl">우승</div>
      <div class="champ-val">—</div>
    </div>
  </div>`;

  html += `</div></div>`;
  return html;
}

/* ──────────────────────────────
   RENDER: KO4 (족구 등)
────────────────────────────── */
function renderKO4(sp) {
  const N1 = sp.r1.matches.length;
  const totalH = N1 * SH;

  let html = `<div class="view-legend">
    <span>총 ${sp.teams}팀 참가</span>`;
  if (sp.byes && sp.byes.length > 0) {
    html += `<span class="bye-note">🎗 부전승: ${sp.byes.join(', ')}</span>`;
  }
  html += `</div>`;

  html += `<div class="bracket-scroll"><div class="bracket">`;

  /* Round 1 */
  let r1slots = '';
  for (const m of sp.r1.matches) {
    r1slots += `<div class="mslot" style="height:${SH}px"><div class="mbox">${T(m[0])}${T(m[1])}</div></div>`;
  }
  html += roundCol(sp.r1.name, r1slots);

  /* Conn 1→2 */
  html += connCol(sp.r2.n, 2*SH);

  /* Round 2 */
  let r2slots = '';
  for (let i=0;i<sp.r2.n;i++) {
    r2slots += `<div class="mslot" style="height:${2*SH}px"><div class="mbox">${T('')}${T('')}</div></div>`;
  }
  html += roundCol(sp.r2.name, r2slots);

  /* Conn 2→3 */
  html += connCol(sp.r3.n, 4*SH);

  /* Round 3 */
  let r3slots = '';
  for (let i=0;i<sp.r3.n;i++) {
    r3slots += `<div class="mslot" style="height:${4*SH}px"><div class="mbox">${T('')}${T('')}</div></div>`;
  }
  html += roundCol(sp.r3.name, r3slots);

  /* Conn 3→Final */
  html += connCol(1, totalH);

  /* Final */
  html += roundCol(sp.fin,
    `<div class="mslot" style="height:${totalH}px"><div class="mbox">${T('')}${T('')}</div></div>`
  );

  /* Conn Final→Champ */
  html += connColSingle(totalH);

  /* Champion */
  html += `<div class="champ-wrap" style="height:${totalH+14}px">
    <div class="champ-card">
      <div class="champ-icon">🏆</div>
      <div class="champ-lbl">우승</div>
      <div class="champ-val">—</div>
    </div>
  </div>`;

  html += `</div></div>`;

  /* 3·4위전 */
  if (sp.tp) {
    html += `<div class="extra-round">
      <div class="mini-section">
        <div class="mini-head">${sp.tp}</div>
        <div class="mini-match">
          <div class="mbox">${T('')}${T('')}</div>
          <span class="mini-result">3위 결정</span>
        </div>
      </div>
    </div>`;
  }

  return html;
}

/* ──────────────────────────────
   INIT
────────────────────────────── */
SPORTS.forEach(sp => {
  const el = document.getElementById(sp.id);
  if (!el) return;
  el.innerHTML = sp.kind === 'grouped' ? renderGrouped(sp) : renderKO4(sp);
});

function show(id, btn) {
  document.querySelectorAll('.sport-view').forEach(e => e.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
}
</script>
</body>
</html>
